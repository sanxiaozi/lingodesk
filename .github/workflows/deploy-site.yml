# 官网自动构建 + 部署 → Cloudflare Pages
# site/ 是构建产物(gitignore):源在 web/(模板 + i18n 字典 + style.css),scripts/build-site.mjs 渲染 15 语言。
# 触发:push main 且 web/ 或构建脚本变更 → 自动 build → deploy。
# CLOUDFLARE_API_TOKEN 未配置时「优雅跳过」(绿色,不发红叉);account id 已内联(不敏感)。
name: Deploy site

on:
  push:
    branches: [main]
    paths: ["web/**", "scripts/build-site.mjs", ".github/workflows/deploy-site.yml"]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HAS_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - name: Skip notice (no token configured)
        if: env.HAS_TOKEN != 'true'
        run: echo "ℹ️ 未配置 CLOUDFLARE_API_TOKEN,跳过自动部署。要启用请在仓库 Secrets 添加该 token。"

      - name: Checkout
        if: env.HAS_TOKEN == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: env.HAS_TOKEN == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build site (i18n render)
        if: env.HAS_TOKEN == 'true'
        run: node scripts/build-site.mjs

      - name: Deploy to Cloudflare Pages
        if: env.HAS_TOKEN == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 611e9807067b3f8f2636e58a9fd67c57
          command: pages deploy site --project-name=lingodesk
